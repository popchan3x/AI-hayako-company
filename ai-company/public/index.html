<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hayako Market AI</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">検証用シグナル</p>
        <h1>Hayako Market AI</h1>
      </div>
      <div class="status" id="status">準備中</div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <label for="assetSelect">分析対象</label>
        <select id="assetSelect"></select>

        <label for="providerSelect">データ</label>
        <select id="providerSelect">
          <option value="demo">デモデータ</option>
          <option value="free-stooq">無料データ</option>
        </select>

        <button id="analyzeButton" type="button">分析</button>

        <section class="panel compact">
          <h2>対象範囲</h2>
          <p>米国株、主要指数、FX、XAUUSD、XAGUSD、XPTUSD。</p>
        </section>
      </aside>

      <section class="workspace">
        <section class="signal-grid">
          <div class="panel signal">
            <p class="eyebrow">売買方向</p>
            <h2 id="direction">-</h2>
            <dl>
              <div><dt>信頼度</dt><dd id="confidence">-</dd></div>
              <div><dt>入口</dt><dd id="entryPrice">-</dd></div>
              <div><dt>損切り</dt><dd id="stopLoss">-</dd></div>
              <div><dt>利確</dt><dd id="takeProfit">-</dd></div>
            </dl>
          </div>

          <div class="panel">
            <p class="eyebrow">AI説明</p>
            <p id="explanation">分析を実行してください。</p>
          </div>
        </section>

        <section class="chart-band">
          <canvas id="priceChart" width="1100" height="360"></canvas>
        </section>

        <section class="columns">
          <div class="panel">
            <h2>根拠</h2>
            <ul id="reasons"></ul>
          </div>
          <div class="panel">
            <h2>注意点</h2>
            <ul id="warnings"></ul>
          </div>
        </section>

        <section class="panel">
          <h2>モデル大会</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>モデル</th>
                  <th>方向</th>
                  <th>信頼度</th>
                  <th>取引数</th>
                  <th>勝率</th>
                  <th>損益</th>
                  <th>最大下落</th>
                </tr>
              </thead>
              <tbody id="tournament"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <h2>X投稿用下書き</h2>
          <textarea id="xDraft" readonly></textarea>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
